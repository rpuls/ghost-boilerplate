services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ghost
      MYSQL_ROOT_PASSWORD: ghost-root
    command:
      - --mysql-native-password=ON
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ughost -pghost --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - ghost-mysql-data:/var/lib/mysql
    ports:
      - "3307:3306"

  ghost-init:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PUBLIC_URL: http://localhost:2368
      PORT: 2368
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ghost
      DB_USER: ghost
      DB_PASSWORD: ghost
      LOG_LEVEL: info
    command: ["sh", "-c", "npm run prestart && npx knex-migrator-init"]
    restart: "no"

  ghost:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
      ghost-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PUBLIC_URL: http://localhost:2368
      PORT: 2368
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ghost
      DB_USER: ghost
      DB_PASSWORD: ghost
      LOG_LEVEL: info
      CLOUDINARY_URL: ${CLOUDINARY_URL:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-ghost-blog-images}
    ports:
      - "2368:2368"
    volumes:
      - ghost-images:/var/lib/ghost/content/images
      - ghost-media:/var/lib/ghost/content/media
      - ghost-files:/var/lib/ghost/content/files

volumes:
  ghost-mysql-data:
  ghost-images:
  ghost-media:
  ghost-files:
